<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sheri Mithu</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* ⭐ Stars */
.star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: starBlink linear infinite;
}
@keyframes starBlink {
    0%,100% { opacity: 0.8; }
    50% { opacity: 0.2; }
}

/* ❤️ Floating hearts */
.heart {
    position: fixed;
    bottom: -20px;
    color: red;
    animation: floatUp linear infinite;
}
@keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-100vh); opacity: 0; }
}

/* 🎈 Balloons */
.balloon {
    position: fixed;
    bottom: -100px;
    animation: floatBalloon linear infinite;
}
@keyframes floatBalloon {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-120vh) rotate(360deg); }
}

/* Side icons */
.side-column {
    position: fixed;
    top: 0;
    width: 40px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    z-index: 1;
}
.side-column-left { left: 0; }
.side-column-right { right: 0; }
.side-column div {
    font-size: 20px;
    animation: floatSide 3s infinite ease-in-out;
}
@keyframes floatSide {
    0%,100% { transform: translateY(0); opacity: 0.7; }
    50% { transform: translateY(-10px); opacity: 1; }
}

/* Main container */
.container {
    padding: 30px 15px;
    position: relative;
    z-index: 2;
}

h1 {
    font-size: 38px;
    color: red;
}

/* Name */
.name {
    font-size: 48px;
    font-weight: bold;
    background: linear-gradient(90deg, red, white, red);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glitter 2s linear infinite;
}
@keyframes glitter {
    from { background-position: 0%; }
    to { background-position: 300%; }
}

/* Photo */
.photo-frame {
    width: 300px;
    height: 400px;
    margin: 25px auto;
    border: 4px solid red;
    box-shadow: 0 0 25px red;
}
.photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Cake */
.cake-frame {
    width: 160px;
    height: 160px;
    margin: 20px auto;
    box-shadow: 0 0 25px red;
    animation: cakeBounce 1.5s infinite;
}
@keyframes cakeBounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

/* Message */
.message {
    max-width: 700px;
    margin: auto;
    padding: 15px;
    border: 2px solid red;
    box-shadow: 0 0 20px red;
    border-radius: 10px;
    font-size: 17px;
    line-height: 1.6;
}

/* Button */
button {
    margin-top: 25px;
    padding: 14px 32px;
    font-size: 18px;
    border: none;
    background: red;
    color: white;
    border-radius: 30px;
    cursor: pointer;
}
button:hover { background: darkred; }

#surpriseText {
    margin-top: 25px;
    font-size: 30px;
    color: red;
    animation: heartBeat 1.3s infinite;
}
@keyframes heartBeat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

/* 📱 Mobile responsive */
@media (max-width: 600px) {
    h1 { font-size: 30px; }
    .name { font-size: 36px; }
    .photo-frame { width: 250px; height: 330px; }
    .message { font-size: 16px; }
}
</style>
</head>

<body>

<div class="side-column side-column-left">
    <div>❤️</div><div>🌟</div><div>❤️</div>
</div>
<div class="side-column side-column-right">
    <div>🌟</div><div>❤️</div><div>🌟</div>
</div>

<!-- Audio -->
<audio id="bgMusic" loop>
    <source src="c:\Users\PMLS\Desktop\Happy bday Shona\music.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>🎉 Happy Birthday 🎉</h1>
    <div class="name">Sheri Mithu</div>

    <div class="photo-frame">
        <img src="oic.jpeg" alt="Sheri">
    </div>

    <p>Born on: <strong>03 July 2006</strong></p>

    <div class="cake-frame">
        <img src="music.mp3" alt="Cake" width="100%" height="100%">
    </div>

    <p class="message" id="typeText"></p>

    <button onclick="surprise()">❤️ Click for a Surprise ❤️</button>
    <div id="surpriseText"></div>
</div>

<script>
// Stars
for (let i = 0; i < 60; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    star.style.animationDuration = Math.random() * 3 + 2 + "s";
    document.body.appendChild(star);
}

// Typewriter
const text = `Happy Birthday, My Love! ❤️🎂

Happy Birthday to the most precious person in my life, my best friend, my biggest blessing, and my forever. Every day with you is a beautiful gift, and I thank Allah for bringing you into my life.

✨ "You are the smile behind my happiness,
The peace within my heart,
The dream I prayed for,
And the love that will never fade." ✨

On your special day, I pray that Allah blesses you with endless happiness, good health, success, and a life filled with peace. May He protect you from every hardship, accept all your prayers, and keep our love strong and pure forever. Ameen. 🤲❤️

No matter where life takes us, my heart will always choose you. Thank you for loving me, understanding me, making me laugh, and standing beside me through everything. You make my world brighter just by being in it.

🌹 "If I had one wish today,
I'd wish for your every dream to come true.
Because your happiness is my happiness,
And my forever begins with you." 🌹

I can't wait for the day when I can celebrate every birthday by your side as your wife, making beautiful memories together. Until then, know that you are always in my heart, in my prayers, and in every beat of my soul.

Happy Birthday, my fiancé. ❤️
I love you more than words can ever express, today, tomorrow, and forever. 🫶✨
`;
let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("typeText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}
typeWriter();

// Surprise + Music
function surprise() {
    document.getElementById("surpriseText").innerHTML =
        "❤️ I LOVE YOU MUNJI JAN ❤️";
    document.getElementById("bgMusic").play();
}

// Hearts
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 15 + 15 + "px";
    heart.style.animationDuration = "5s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}, 600);

// Balloons
setInterval(() => {
    const balloon = document.createElement("div");
    balloon.className = "balloon";
    balloon.innerHTML = "🎈";
    balloon.style.left = Math.random() * 100 + "vw";
    balloon.style.fontSize = "30px";
    balloon.style.animationDuration = "6s";
    document.body.appendChild(balloon);
    setTimeout(() => balloon.remove(), 6000);
}, 1200);
</script>

</body>
</html>
